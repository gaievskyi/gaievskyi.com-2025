name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - '.cursor/**'
      - '.agents/**'
      - 'public/**'
      - 'skills-lock.json'
      - 'components.json'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - '.cursor/**'
      - '.agents/**'
      - 'public/**'
      - 'skills-lock.json'
      - 'components.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: oven/bun:latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: .cache/eslint
          key: ${{ runner.os }}-eslint-${{ hashFiles('bun.lock', 'eslint.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-eslint-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

  # Doens't work with bun yet,
  # See: https://github.com/oven-sh/bun/issues/25610

  # format:
  #   name: Format Check
  #   runs-on: ubuntu-latest
  #   container:
  #     image: oven/bun:latest

  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Cache bun dependencies
  #       uses: actions/cache@v4
  #       with:
  #         path: ~/.bun/install/cache
  #         key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
  #         restore-keys: |
  #           ${{ runner.os }}-bun-

  #     - name: Install dependencies
  #       run: bun install --frozen-lockfile

  #     - name: Run oxfmt check
  #       run: bun run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    container:
      image: oven/bun:latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache TypeScript
        uses: actions/cache@v4
        with:
          path: tsconfig.tsbuildinfo
          key: ${{ runner.os }}-tsc-${{ hashFiles('bun.lock', 'tsconfig.json', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-tsc-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Next.js types
        run: bun run next typegen

      - name: Run tsc
        run: bun run typecheck
