<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outdated Browser</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        background: white;
        overflow: hidden;
      }
      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 600px;
        margin-left: -300px;
        margin-top: -100px;
      }
      .icon {
        margin-bottom: 16px;
      }
      h1 {
        margin-bottom: 16px;
      }
      p {
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="64"
          height="64"
          viewBox="0 0 24 24"
          fill="red"
          stroke="white"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" x2="12" y1="8" y2="12" />
          <line x1="12" x2="12.01" y1="16" y2="16" />
        </svg>
      </div>
      <h1>Your browser isn't supported.</h1>
      <p>
        Please use a modern alternative (Chrome, Firefox, Safari) to continue.
      </p>
    </div>
  </body>
</html>
